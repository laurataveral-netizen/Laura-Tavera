<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imagenix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Imagenix 📸</h1>
    
    <div id="loginbox">
        <h2>Login 🔐</h2>
        <input id="user" placeholder="Usuario">
        <input id="pass" type="password" placeholder="Contraseña">
        <button onclick="login()" class="btn-green">Entrar</button>
    </div>

    <div id="galeria-seccion" style="display: none;">
        <h3>Crear carpeta</h3>
        <input id="nombreCarpeta" placeholder="Nombre carpeta">
        <button onclick="crearCarpeta()" class="btn-green">Crear</button>

        <h3>Subir imagen</h3>
        <input type="file" id="imagen">
        <select id="carpetas"></select> 
        <button onclick="subirImagen()" class="btn-green">Subir</button>

        <h3>Galería</h3>
        <div id="galeria"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
